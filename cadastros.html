<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Cadastros de Clientes · Get Started</title><style>  :root{    --graphite:#2C2D2F; --yellow:#FBBC19; --offwhite:#F0F1ED;    --deep:#212123; --line:#3A3A3D; --muted:#8a8a8d; --paper:#26272a;  }  *{box-sizing:border-box;margin:0;padding:0;}  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--graphite);color:var(--offwhite);min-height:100vh;}  .wrap{max-width:760px;margin:0 auto;padding:32px 18px 60px;}  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;margin-bottom:6px;}  .dot{width:13px;height:13px;border-radius:50%;background:var(--yellow);flex-shrink:0;}  .rule{width:52px;height:5px;background:var(--yellow);border-radius:2px;margin:14px 0 6px 0;}  h1{font-size:24px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px;}  h1 .y{color:var(--yellow);}  .sub{color:var(--muted);font-size:12px;margin-bottom:20px;}  /* GATE */  .gate{max-width:340px;margin:80px auto;text-align:center;}  .gate .lock{font-size:36px;margin-bottom:14px;}  .gate input{width:100%;background:var(--deep);border:1px solid var(--line);border-radius:9px;color:#fff;padding:13px;font-size:16px;text-align:center;margin-bottom:10px;}  .gate input:focus{outline:none;border-color:var(--yellow);}  .gate button{width:100%;background:var(--yellow);color:var(--graphite);border:none;border-radius:9px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;}  .gate .erro{color:#e07a7a;font-size:12px;margin-top:8px;display:none;}  /* CONTENT */  #conteudo{display:none;}  .search{width:100%;background:var(--deep);border:1px solid var(--line);border-radius:10px;color:#fff;padding:12px 14px;font-size:14px;margin-bottom:18px;}  .search:focus{outline:none;border-color:var(--yellow);}  .count{font-size:11.5px;color:var(--muted);margin-bottom:12px;}  .list{display:flex;flex-direction:column;gap:10px;}  .item{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:16px 18px;}  .item .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:10px;}  .item .nome{font-weight:800;font-size:15.5px;}  .item .data{font-size:10px;color:var(--muted);white-space:nowrap;}  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;font-size:12.5px;}  .grid .k{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}  .grid .v{color:#fff;}  .contatos-box{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);font-size:12px;white-space:pre-wrap;color:#ddd;}  .empty{text-align:center;color:var(--muted);font-size:13px;padding:40px 0;}  .foot{margin-top:26px;text-align:center;color:var(--muted);font-size:10px;}</style></head><body><div class="wrap">  <div id="gate" class="gate">    <div class="lock">🔒</div>    <div class="brand" style="justify-content:center;"><span class="dot"></span>Get Started</div>    <div class="sub" style="margin:8px 0 18px;">Área restrita da equipe.</div>    <input type="password" id="senhaInput" placeholder="Senha de acesso" onkeydown="if(event.key==='Enter')entrar()">    <button onclick="entrar()">Entrar</button>    <div class="erro" id="erroSenha">Senha incorreta.</div>  </div>  <div id="conteudo">    <div class="brand"><span class="dot"></span>Get Started</div>    <div class="rule"></div>    <h1>Cadastros de <span class="y">Clientes</span></h1>    <div class="sub">Área privada da equipe — não compartilhe este link com clientes.</div>    <input class="search" id="search" type="text" placeholder="🔍 Buscar por nome ou @ do Instagram..." oninput="filtrar()">    <div class="count" id="count"></div>    <div class="list" id="list"></div>    <div class="empty" id="empty" style="display:none;">Nenhum cadastro ainda.</div>    <div class="foot">Get Started Produções · Painel interno · Dados privados dos clientes.</div>  </div></div><script type="module">  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";  import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";  const firebaseConfig = {    apiKey: "AIzaSyAyvxHHInEQMpcNHKY__lj3T2G5cikGoyw",    authDomain: "get-started-4956d.firebaseapp.com",    projectId: "get-started-4956d",    storageBucket: "get-started-4956d.firebasestorage.app",    messagingSenderId: "27813235721",    appId: "1:27813235721:web:38c8e840153e2ae3853cd8"  };  const app = initializeApp(firebaseConfig);  const db = getFirestore(app);  const SENHA = "Cg@102030";  let cadastros = [];  window.entrar = function(){    const v = document.getElementById('senhaInput').value;    if(v === SENHA){      sessionStorage.setItem('get_auth','ok');      mostrarConteudo();    } else {      document.getElementById('erroSenha').style.display='block';    }  };  async function mostrarConteudo(){    document.getElementById('gate').style.display='none';    document.getElementById('conteudo').style.display='block';    await carregar();  }  async function carregar(){    const q = query(collection(db,'cadastros_clientes'), orderBy('criadoEm','desc'));    const snap = await getDocs(q);    cadastros = [];    snap.forEach(doc => cadastros.push(doc.data()));    render(cadastros);  }  function render(lista){    const list = document.getElementById('list');    const empty = document.getElementById('empty');    document.getElementById('count').textContent = lista.length + (lista.length===1?' cadastro':' cadastros');    if(!lista.length){ list.innerHTML=''; empty.style.display='block'; return; }    empty.style.display='none';    list.innerHTML = lista.map(c => {      const data = c.criadoEm && c.criadoEm.toDate ? c.criadoEm.toDate().toLocaleDateString('pt-BR') : '';      return '<div class="item">'+        '<div class="top"><div class="nome">'+esc(c.nome)+'</div><div class="data">'+data+'</div></div>'+        '<div class="grid">'+          '<div><div class="k">Instagram</div><div class="v">'+esc(c.instagram)+'</div></div>'+          '<div><div class="k">Telefone</div><div class="v">'+esc(c.telefone)+'</div></div>'+          '<div><div class="k">Aniversário</div><div class="v">'+esc(c.aniversario||'—')+'</div></div>'+        '</div>'+        (c.contatos ? '<div class="contatos-box"><div class="k" style="margin-bottom:4px;">Contatos pro grupo</div>'+esc(c.contatos)+'</div>' : '')+      '</div>';    }).join('');  }  window.filtrar = function(){    const q = document.getElementById('search').value.toLowerCase().trim();    render(cadastros.filter(c => (c.nome||'').toLowerCase().includes(q) || (c.instagram||'').toLowerCase().includes(q)));  };  function esc(s){return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}  if(sessionStorage.getItem('get_auth')==='ok'){ mostrarConteudo(); }</script></body></html>
