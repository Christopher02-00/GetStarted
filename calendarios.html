<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendários Editoriais · Get Started</title>
<style>
  :root{
    --graphite:#2C2D2F; --yellow:#FBBC19; --offwhite:#F0F1ED;
    --deep:#212123; --line:#3A3A3D; --muted:#8a8a8d; --paper:#26272a;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--graphite);color:var(--offwhite);min-height:100vh;}
  .wrap{max-width:720px;margin:0 auto;padding:32px 18px 60px;}

  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;margin-bottom:6px;}
  .dot{width:13px;height:13px;border-radius:50%;background:var(--yellow);flex-shrink:0;}
  .rule{width:52px;height:5px;background:var(--yellow);border-radius:2px;margin:14px 0 6px 0;}
  h1{font-size:26px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px;}
  h1 .y{color:var(--yellow);}
  .sub{color:var(--muted);font-size:12.5px;margin-bottom:22px;}

  .search{width:100%;background:var(--deep);border:1px solid var(--line);border-radius:10px;color:#fff;padding:12px 14px;font-size:14px;margin-bottom:18px;}
  .search:focus{outline:none;border-color:var(--yellow);}
  .search::placeholder{color:var(--muted);}

  .count{font-size:11.5px;color:var(--muted);margin-bottom:10px;}

  .list{display:flex;flex-direction:column;gap:8px;}
  .card{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:14px 16px;text-decoration:none;color:var(--offwhite);transition:.12s;}
  .card:hover{border-color:var(--yellow);}
  .card .name{font-weight:700;font-size:14.5px;}
  .card .arrow{color:var(--yellow);font-size:16px;flex-shrink:0;}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:30px 0;}

  .foot{margin-top:30px;text-align:center;color:var(--muted);font-size:10.5px;line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><span class="dot"></span>Get Started</div>
  <div class="rule"></div>
  <h1>Calendários <span class="y">Editoriais</span></h1>
  <div class="sub">Clique no cliente pra abrir o calendário editorial correspondente.</div>

  <input class="search" id="search" type="text" placeholder="🔍 Buscar cliente..." oninput="filtrar()">
  <div class="count" id="count"></div>

  <div class="list" id="list"></div>
  <div class="empty" id="empty" style="display:none;">Nenhum cliente encontrado.</div>

  <div class="foot">Get Started Produções · Calendários Editoriais · Clique em um cliente pra abrir o calendário em tempo real.</div>
</div>

<script>
const clientes = [
  {nome:"Bluefit", slug:"bluefit"},
  {nome:"Camargo's", slug:"camargos"},
  {nome:"Juliane Nerone", slug:"juliane-nerone"},
  {nome:"Dra. Monique", slug:"dra-monique"},
  {nome:"Hitech", slug:"hitech"},
  {nome:"Joaquin Assados", slug:"joaquin-assados"},
  {nome:"Mochi", slug:"mochi"},
  {nome:"Vitalle Odonto", slug:"vitalle-odonto"},
  {nome:"Place", slug:"place"},
  {nome:"Stokki", slug:"stokki"},
  {nome:"Vip", slug:"vip"},
  {nome:"Vital Seg", slug:"vital-seg"},
  {nome:"Divina Cantina", slug:"divina-cantina"},
  {nome:"Helo Arquiteta", slug:"helo-arquiteta"},
  {nome:"Rodrigo", slug:"rodrigo"},
  {nome:"Fior Restaurante", slug:"fior-restaurante"}
];

function render(lista){
  const list = document.getElementById('list');
  const empty = document.getElementById('empty');
  document.getElementById('count').textContent = lista.length + (lista.length===1?' cliente':' clientes');
  if(!lista.length){ list.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  list.innerHTML = lista.map(c =>
    '<a class="card" href="calendario.html?cliente='+encodeURIComponent(c.slug)+'">'+
    '<span class="name">'+esc(c.nome)+'</span><span class="arrow">→</span></a>'
  ).join('');
}
function filtrar(){
  const q = document.getElementById('search').value.toLowerCase().trim();
  const filtrados = clientes.filter(c => c.nome.toLowerCase().includes(q));
  render(filtrados);
}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ordena alfabeticamente e renderiza
clientes.sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR'));
render(clientes);
</script>
</body>
</html>
