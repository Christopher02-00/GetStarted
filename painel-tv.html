<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel · Get Started</title>
<style>
  :root{
    --graphite:#2C2D2F; --yellow:#FBBC19; --offwhite:#F0F1ED;
    --deep:#212123; --line:#3A3A3D; --muted:#8a8a8d; --paper:#26272a;
    --green:#4caf72; --greenbg:#1e3428; --red:#e07a7a; --redbg:#3a2323;
    --yellow2:#e0c56a; --yellowbg:#3a3420;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--graphite);color:var(--offwhite);overflow:hidden;}

  .gate{max-width:340px;margin:100px auto;text-align:center;}
  .gate .lock{font-size:40px;margin-bottom:14px;}
  .gate input{width:100%;background:var(--deep);border:1px solid var(--line);border-radius:9px;color:#fff;padding:14px;font-size:18px;text-align:center;margin-bottom:12px;}
  .gate button{width:100%;background:var(--yellow);color:var(--graphite);border:none;border-radius:9px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;}
  .gate .erro{color:var(--red);font-size:12px;margin-top:8px;display:none;}

  .painel{display:none;padding:28px 34px;height:100vh;}
  .painel.show{display:flex;flex-direction:column;}

  .topo{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px;}
  .dot{width:14px;height:14px;border-radius:50%;background:var(--yellow);}
  .relogio{font-size:14px;color:var(--muted);}

  .semaforoTopo{display:flex;align-items:center;gap:10px;background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:16px 24px;margin-bottom:22px;}
  .semaforoTopo .bola{width:16px;height:16px;border-radius:50%;flex-shrink:0;}
  .semaforoTopo .bola.verde{background:var(--green);box-shadow:0 0 12px var(--green);}
  .semaforoTopo .bola.amarelo{background:var(--yellow2);box-shadow:0 0 12px var(--yellow2);}
  .semaforoTopo .bola.vermelho{background:var(--red);box-shadow:0 0 12px var(--red);}
  .semaforoTopo .txt{font-size:18px;font-weight:800;}
  .semaforoTopo .txt span{display:block;font-size:12px;font-weight:400;color:var(--muted);margin-top:2px;}

  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;flex:1;overflow:hidden;}
  .painelCard{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:20px;display:flex;flex-direction:column;}
  .painelCard h2{font-size:14px;font-weight:800;color:var(--yellow2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:14px;}
  .painelCard .corpo{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;}

  .numGrande{font-size:52px;font-weight:800;line-height:1;}
  .lblGrande{font-size:12px;color:var(--muted);margin-top:6px;text-align:center;}

  .barrasWrap{width:100%;}
  .barraLinha{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .barraLinha .nomeBarra{font-size:12px;font-weight:700;width:80px;flex-shrink:0;}
  .barraLinha .trilho{flex:1;height:14px;background:var(--deep);border-radius:7px;overflow:hidden;}
  .barraLinha .fill{height:100%;background:var(--yellow);border-radius:7px;transition:width .5s;}
  .barraLinha .valorBarra{font-size:11px;color:var(--muted);width:50px;text-align:right;flex-shrink:0;}

  .miniStats{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
  .miniStat{text-align:center;}
  .miniStat .n{font-size:30px;font-weight:800;}
  .miniStat .l{font-size:10px;color:var(--muted);text-transform:uppercase;}
  .miniStat.red .n{color:var(--red);}
  .miniStat.yellow .n{color:var(--yellow2);}
  .miniStat.green .n{color:var(--green);}

  .funcionarioMesBanner{background:linear-gradient(135deg, var(--yellowbg), var(--paper));border:2px solid var(--yellow);border-radius:16px;padding:18px 24px;margin-bottom:22px;display:flex;align-items:center;gap:16px;}
  .funcionarioMesBanner .troco{font-size:32px;}
  .funcionarioMesBanner .txt{font-size:16px;font-weight:800;}
  .funcionarioMesBanner .txt span{display:block;font-size:11.5px;font-weight:400;color:var(--muted);margin-top:2px;}

  .leaderboard{background:var(--paper);border:2px solid var(--yellow);border-radius:16px;padding:18px 22px;margin-bottom:20px;}
  .leaderboard h2{font-size:13px;font-weight:800;color:var(--yellow2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px;}
  .lbLinha{margin-bottom:10px;}
  .lbTopo{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:3px;}
  .lbDica{font-size:10px;color:var(--muted);margin-top:2px;}
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="lock">📺</div>
  <h1 style="font-size:20px;">Painel de <span style="color:var(--yellow);">Acompanhamento</span></h1>
  <div style="color:var(--muted);font-size:13px;margin:12px 0;">Privado — Gerência.</div>
  <input type="password" id="senhaPainel" placeholder="Senha" onkeydown="if(event.key==='Enter')entrar()">
  <button onclick="entrar()">Entrar</button>
  <div class="erro" id="erroSenha">Senha incorreta.</div>
</div>

<div class="painel" id="painel">
  <div class="topo">
    <div class="brand"><span class="dot"></span>Get Started — Painel Geral</div>
    <div class="relogio" id="relogio"></div>
  </div>

  <div class="semaforoTopo" id="semaforoTopo"></div>

  <div class="leaderboard" id="leaderboard"></div>

  <div class="grid">
    <div class="painelCard">
      <h2>Demandas em aberto</h2>
      <div class="corpo">
        <div class="miniStats" id="statsDemandas"></div>
      </div>
    </div>

    <div class="painelCard">
      <h2>Vídeos em edição por pessoa</h2>
      <div class="corpo"><div class="barrasWrap" id="barrasVideos"></div></div>
    </div>

    <div class="painelCard">
      <h2>Checklist diário — hoje</h2>
      <div class="corpo"><div class="barrasWrap" id="barrasChecklist"></div></div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAyvxHHInEQMpcNHKY__lj3T2G5cikGoyw",
    authDomain: "get-started-4956d.firebaseapp.com",
    projectId: "get-started-4956d",
    storageBucket: "get-started-4956d.firebasestorage.app",
    messagingSenderId: "27813235721",
    appId: "1:27813235721:web:38c8e840153e2ae3853cd8"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const SENHA = "Cg@102030";
  const EDITORES_GERAL = ["Helo","Cecília","João Victor"];
  const EDITORES_CAPACIDADE = { "Helo":5, "Cecília":2, "João Victor":3 };
  const CHECKLIST_DIARIO_TOTAL = { "Cecília": 13, "Gabrielle": 9 };
  const FUNCIONARIOS_ELEGIVEIS = ["Cecília","Gabrielle","Amanda","Helo","João Victor","Yas","Nathan","Luís"];

  function esc(s){return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  window.entrar = function(){
    const v = document.getElementById('senhaPainel').value;
    if(v === SENHA){
      document.getElementById('gate').style.display = 'none';
      document.getElementById('painel').classList.add('show');
      iniciarPainel();
    } else {
      document.getElementById('erroSenha').style.display = 'block';
    }
  };

  function atualizarRelogio(){
    const agora = new Date();
    document.getElementById('relogio').textContent = agora.toLocaleDateString('pt-BR') + ' · ' + agora.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
  }

  function calcularUrgenciaDemanda(d){
    if(d.status !== 'pendente') return 'normal';
    const agora = new Date();
    const prazo = new Date(d.prazoData + 'T' + (d.prazoHora || '19:00'));
    if (agora > prazo) return 'atrasado';
    return 'normal';
  }

  async function carregarDados(){
    const [demandasSnap, videosSnap] = await Promise.all([
      getDocs(collection(db,'demandas')),
      getDocs(collection(db,'videos_producao'))
    ]);
    const demandas = []; demandasSnap.forEach(d => demandas.push(d.data()));
    const videos = []; videosSnap.forEach(d => videos.push(d.data()));

    renderSemaforo(demandas);
    renderStatsDemandas(demandas);
    renderBarrasVideos(videos);
    await renderChecklistHoje();
    await renderLeaderboard(demandas, videos);
  }

  function renderSemaforo(demandas){
    const pendentes = demandas.filter(d => d.status === 'pendente');
    const atrasadas = pendentes.filter(d => calcularUrgenciaDemanda(d) === 'atrasado');
    let cor = 'verde', texto = 'Tudo em dia na operação';
    if(atrasadas.length > 2){ cor = 'vermelho'; texto = atrasadas.length + ' demandas atrasadas — atenção imediata'; }
    else if(atrasadas.length > 0){ cor = 'amarelo'; texto = atrasadas.length + ' demanda(s) precisando de atenção'; }
    document.getElementById('semaforoTopo').innerHTML = `<div class="bola ${cor}"></div><div class="txt">Saúde geral da agência<span>${esc(texto)}</span></div>`;
  }

  function renderStatsDemandas(demandas){
    const pendentes = demandas.filter(d => d.status === 'pendente');
    const atrasadas = pendentes.filter(d => calcularUrgenciaDemanda(d) === 'atrasado');
    const aguardando = demandas.filter(d => d.status === 'concluida_aguardando_aprovacao');
    const aprovadas = demandas.filter(d => d.status === 'aprovada');
    document.getElementById('statsDemandas').innerHTML = `
      <div class="miniStat red"><div class="n">${atrasadas.length}</div><div class="l">Atrasadas</div></div>
      <div class="miniStat yellow"><div class="n">${aguardando.length}</div><div class="l">Aguardando aprovação</div></div>
      <div class="miniStat"><div class="n">${pendentes.length}</div><div class="l">Em aberto</div></div>
      <div class="miniStat green"><div class="n">${aprovadas.length}</div><div class="l">Concluídas</div></div>
    `;
  }

  function renderBarrasVideos(videos){
    const abertos = videos.filter(v => v.status !== 'concluido');
    let html = '';
    EDITORES_GERAL.forEach(ed => {
      const qtd = abertos.filter(v => v.editorAtribuido === ed).length;
      const cap = EDITORES_CAPACIDADE[ed];
      const pct = Math.min(100, Math.round((qtd/cap)*100));
      html += `<div class="barraLinha"><div class="nomeBarra">${esc(ed)}</div><div class="trilho"><div class="fill" style="width:${pct}%;"></div></div><div class="valorBarra">${qtd}/${cap}</div></div>`;
    });
    document.getElementById('barrasVideos').innerHTML = html;
  }

  async function renderChecklistHoje(){
    const hoje = new Date().toISOString().slice(0,10);
    const nomes = Object.keys(CHECKLIST_DIARIO_TOTAL);
    let html = '';
    for(const nome of nomes){
      const chave = nome + '_diario_' + hoje;
      const snap = await getDoc(doc(db,'checklist_execucoes', chave));
      const feitos = snap.exists() ? Object.keys(snap.data().itensFeitos || {}).length : 0;
      const total = CHECKLIST_DIARIO_TOTAL[nome];
      const pct = Math.round((feitos/total)*100);
      html += `<div class="barraLinha"><div class="nomeBarra">${esc(nome)}</div><div class="trilho"><div class="fill" style="width:${pct}%;"></div></div><div class="valorBarra">${feitos}/${total}</div></div>`;
    }
    document.getElementById('barrasChecklist').innerHTML = html;
  }

  function calcularUrgenciaDemandaSimples(d){
    if(d.status !== 'pendente') return 'normal';
    const agora = new Date();
    const prazo = new Date(d.prazoData + 'T' + (d.prazoHora || '19:00'));
    return agora > prazo ? 'atrasado' : 'normal';
  }

  function gerarDicaMelhoriaTv(r){
    const dicas = [];
    if(r.atrasadasAtual > 0) dicas.push('reduzir atrasos (' + r.atrasadasAtual + ')');
    if(r.checklistPct !== null && r.checklistPct < 80) dicas.push('checklist em ' + r.checklistPct + '%');
    if(r.aprovadas === 0) dicas.push('concluir demandas');
    return dicas.length ? dicas.join(' · ') : 'Sem pendências — ótimo ritmo';
  }

  async function calcularRankingTv(demandas, videos){
    const mesAtual = new Date().toISOString().slice(0,7);
    const ranking = [];
    for(const nome of FUNCIONARIOS_ELEGIVEIS){
      const minhasDemandas = demandas.filter(d => d.destinatario === nome);
      const aprovadas = minhasDemandas.filter(d => d.status === 'aprovada').length;
      const atrasadasAtual = minhasDemandas.filter(d => d.status === 'pendente' && calcularUrgenciaDemandaSimples(d) === 'atrasado').length;
      const videosConcluidos = videos.filter(v => v.editorAtribuido === nome && v.status === 'concluido').length;

      let checklistPct = null;
      if(CHECKLIST_DIARIO_TOTAL[nome]){
        const hoje = new Date().toISOString().slice(0,10);
        const snap = await getDoc(doc(db,'checklist_execucoes', nome+'_diario_'+hoje));
        const feitos = snap.exists() ? Object.keys(snap.data().itensFeitos||{}).length : 0;
        checklistPct = Math.round((feitos/CHECKLIST_DIARIO_TOTAL[nome])*100);
      }
      const pontos = (aprovadas*10) - (atrasadasAtual*15) + (videosConcluidos*8) + ((checklistPct||0)*0.5);
      ranking.push({ nome, aprovadas, atrasadasAtual, videosConcluidos, checklistPct, pontos: Math.round(pontos) });
    }
    return ranking.sort((a,b)=>b.pontos-a.pontos);
  }

  async function renderLeaderboard(demandas, videos){
    const ranking = await calcularRankingTv(demandas, videos);
    const maiorPontos = Math.max(...ranking.map(r=>r.pontos), 1);
    let html = '<h2>🏆 Corrida do Funcionário do Mês</h2>';
    ranking.forEach((r,i) => {
      const pct = Math.max(5, Math.round((Math.max(r.pontos,0)/maiorPontos)*100));
      html += `<div class="lbLinha">
        <div class="lbTopo"><span>${i===0?'🥇 ':i===1?'🥈 ':i===2?'🥉 ':''}${esc(r.nome)}</span><span>${r.pontos} pts</span></div>
        <div class="barraLinha" style="margin-bottom:2px;"><div class="trilho"><div class="fill" style="width:${pct}%;"></div></div></div>
        <div class="lbDica">${esc(gerarDicaMelhoriaTv(r))}</div>
      </div>`;
    });
    document.getElementById('leaderboard').innerHTML = html;
  }

  function iniciarPainel(){
    atualizarRelogio();
    carregarDados();
    setInterval(atualizarRelogio, 1000);
    setInterval(carregarDados, 60000);
  }
</script>
</body>
</html>
