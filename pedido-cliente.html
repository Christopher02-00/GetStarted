<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enviar Pedido · Get Started</title>
<style>
  :root{
    --graphite:#2C2D2F; --yellow:#FBBC19; --offwhite:#F0F1ED;
    --deep:#212123; --line:#3A3A3D; --muted:#8a8a8d; --paper:#26272a;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--graphite);color:var(--offwhite);min-height:100vh;}
  .wrap{max-width:520px;margin:0 auto;padding:36px 18px 60px;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;margin-bottom:6px;}
  .dot{width:13px;height:13px;border-radius:50%;background:var(--yellow);flex-shrink:0;}
  .rule{width:52px;height:5px;background:var(--yellow);border-radius:2px;margin:14px 0 10px 0;}
  h1{font-size:24px;font-weight:800;letter-spacing:-.02em;margin-bottom:8px;}
  h1 .y{color:var(--yellow);}
  .sub{color:var(--muted);font-size:13px;margin-bottom:24px;line-height:1.5;}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:16px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:11.5px;font-weight:700;margin-bottom:6px;}
  .field input,.field textarea,.field select{width:100%;background:var(--deep);border:1px solid var(--line);border-radius:9px;color:#fff;padding:12px 13px;font-size:16px;font-family:inherit;}
  .field textarea{resize:vertical;min-height:90px;}
  .btn{width:100%;background:var(--yellow);color:var(--graphite);border:none;border-radius:10px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;}
  .btn:disabled{opacity:.5;}
  .status{display:none;text-align:center;padding:40px 20px;}
  .status.show{display:block;}
  .status .icon{font-size:44px;margin-bottom:14px;}
  .foot{margin-top:20px;text-align:center;color:var(--muted);font-size:10px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><span class="dot"></span>Get Started</div>
  <div class="rule"></div>
  <h1>Envie seu <span class="y">Pedido</span></h1>
  <div class="sub">Preenche rapidinho o que você precisa — já cai direto pra pessoa certa da nossa equipe.</div>

  <form id="formPedido">
    <div class="card">
      <div class="field"><label>Seu nome / empresa</label><input type="text" id="clienteNome" required placeholder="Ex: Fior Restaurante"></div>
      <div class="field"><label>Sobre o que é o pedido?</label>
        <select id="tipoPedido">
          <option value="Cecília">Gravação / Agendamento</option>
          <option value="Gabrielle">Ideia de conteúdo / Roteiro</option>
          <option value="Amanda">Outro assunto</option>
        </select>
      </div>
      <div class="field"><label>O que você precisa?</label><textarea id="pedidoDesc" required placeholder="Descreve seu pedido com detalhes..."></textarea></div>
      <div class="field"><label>É urgente? (afeta o prazo)</label>
        <select id="urgencia">
          <option value="normal">Normal (até o fim do dia útil seguinte)</option>
          <option value="hoje">Preciso ainda hoje</option>
        </select>
      </div>
    </div>
    <button type="submit" class="btn" id="btnEnviar">Enviar pedido</button>
  </form>

  <div class="status" id="status">
    <div class="icon">✅</div>
    <h2>Recebemos seu pedido!</h2>
    <p style="color:var(--muted);margin-top:8px;">Nossa equipe já foi avisada e vai cuidar disso.</p>
  </div>

  <div class="foot">Get Started Produções</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAyvxHHInEQMpcNHKY__lj3T2G5cikGoyw",
    authDomain: "get-started-4956d.firebaseapp.com",
    projectId: "get-started-4956d",
    storageBucket: "get-started-4956d.firebasestorage.app",
    messagingSenderId: "27813235721",
    appId: "1:27813235721:web:38c8e840153e2ae3853cd8"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  function proximaDataUtil(hoje){
    const d = new Date(hoje);
    d.setDate(d.getDate() + 1);
    while(d.getDay() === 0 || d.getDay() === 6){ d.setDate(d.getDate() + 1); }
    return d.toISOString().slice(0,10);
  }

  const form = document.getElementById('formPedido');
  const btn = document.getElementById('btnEnviar');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btn.disabled = true; btn.textContent = 'Enviando...';

    const hoje = new Date();
    const hojeStr = hoje.toISOString().slice(0,10);
    const urgencia = document.getElementById('urgencia').value;
    const prazoData = urgencia === 'hoje' ? hojeStr : proximaDataUtil(hojeStr);

    const dados = {
      titulo: 'Pedido de cliente: ' + document.getElementById('clienteNome').value.trim(),
      descricao: document.getElementById('pedidoDesc').value.trim(),
      origem: 'cliente',
      clienteNome: document.getElementById('clienteNome').value.trim(),
      destinatario: document.getElementById('tipoPedido').value,
      prazoData: prazoData,
      prazoHora: '19:00',
      status: 'pendente',
      provaTexto: '', provaImagemUrl: '',
      criadoEm: serverTimestamp()
    };

    try {
      await addDoc(collection(db, 'demandas'), dados);
      form.style.display = 'none';
      document.getElementById('status').classList.add('show');
    } catch(err){
      alert('Algo deu errado. Tenta de novo ou chama no WhatsApp.');
      btn.disabled = false; btn.textContent = 'Enviar pedido';
    }
  });
</script>
</body>
</html>
