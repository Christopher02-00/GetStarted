<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal do Cliente · Get Started</title>
<style>
  :root{
    --graphite:#2C2D2F; --yellow:#FBBC19; --offwhite:#F0F1ED;
    --deep:#212123; --line:#3A3A3D; --muted:#8a8a8d;
    --green:#4caf72; --greenbg:#1e3428; --red:#e0625f; --redbg:#3a2323; --paper:#26272a;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--graphite);color:var(--offwhite);min-height:100vh;}
  .wrap{max-width:900px;margin:0 auto;padding:22px 18px 60px;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;margin-bottom:24px;}
  .dot{width:13px;height:13px;border-radius:50%;background:var(--yellow);}
  .rule{width:52px;height:5px;background:var(--yellow);border-radius:2px;margin-bottom:8px;}
  h1{font-size:24px;font-weight:800;margin-bottom:4px;}
  h1 .y{color:var(--yellow);}
  .sub{color:var(--muted);font-size:12.5px;margin-bottom:20px;}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px;}
  .card h2{font-size:15px;margin-bottom:6px;}
  .field label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:5px;}
  select, input, textarea{width:100%;background:var(--deep);border:1px solid var(--line);color:#fff;padding:11px;border-radius:9px;font-size:14px;font-family:inherit;}
  textarea{min-height:80px;resize:vertical;}
  .btn{background:var(--yellow);color:var(--graphite);border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;width:100%;margin-top:10px;}
  .btn.secondary{background:transparent;border:1px solid var(--line);color:var(--offwhite);}
  .tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:16px;padding-bottom:4px;}
  .tab{background:var(--paper);border:1px solid var(--line);color:var(--muted);padding:9px 15px;border-radius:20px;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap;}
  .tab.active{background:var(--yellow);color:var(--graphite);border-color:var(--yellow);}
  .item{background:var(--deep);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
  .item .nome{font-weight:700;font-size:13.5px;}
  .item .meta{color:var(--muted);font-size:11px;margin-top:3px;}
  .selo{display:inline-block;font-size:9.5px;font-weight:800;text-transform:uppercase;padding:3px 8px;border-radius:20px;margin-top:6px;}
  .selo.planejamento{background:#333;color:#ccc;}
  .selo.roteiro{background:#333;color:#ccc;}
  .selo.gravacao{background:var(--redbg);color:var(--red);}
  .selo.edicao{background:#3a331e;color:var(--yellow);}
  .selo.revisao{background:#3a331e;color:var(--yellow);}
  .selo.programado{background:#1e2f3a;color:#7ec4e0;}
  .selo.publicado{background:var(--greenbg);color:var(--green);}
  .day{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--line);}
  .day:last-child{border-bottom:none;}
  .daynum{width:40px;text-align:center;flex-shrink:0;}
  .daynum .d{font-size:19px;font-weight:800;}
  .daynum .m{font-size:9px;color:var(--muted);text-transform:uppercase;}
  .empty{color:var(--muted);font-size:12.5px;text-align:center;padding:20px;}
  .backBtn{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;margin-bottom:14px;}
  .badge{background:var(--yellow);color:var(--graphite);font-size:10px;font-weight:800;padding:2px 7px;border-radius:10px;margin-left:6px;}
  .ic{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;vertical-align:-3px;margin-right:6px;}
  h1 .ic{width:20px;height:20px;}
</style>
</head>
<body>

<div class="wrap" id="app">
  <div class="brand"><span class="dot"></span> Get Started <span style="color:var(--muted);font-weight:500;">· Portal do Cliente</span></div>

  <div id="telaSelecao">
    <div class="rule"></div>
    <h1>Bem-vindo ao seu <span class="y">Portal</span></h1>
    <div class="sub">Seleciona sua empresa pra acessar seu acompanhamento.</div>
    <div class="card">
      <div class="field"><label>Sua empresa</label><select id="selCliente"><option value="">Selecione...</option></select></div>
      <button class="btn" onclick="entrarPortal()">Entrar</button>
    </div>
  </div>

  <div id="telaPortal" style="display:none;">
    <button class="backBtn" onclick="sairPortal()">← Trocar de empresa</button>
    <div class="rule"></div>
    <h1 id="nomeClientePortal">Cliente</h1>
    <div class="sub">Seu painel de acompanhamento — tudo em um lugar só.</div>

    <div class="tabs">
      <div class="tab active" data-tab="calendario" onclick="setTab('calendario', this)"><svg class="ic"><use href="#i-calendar"/></svg>Calendário</div>
      <div class="tab" data-tab="demandas" onclick="setTab('demandas', this)"><svg class="ic"><use href="#i-clipboard"/></svg>Demandas<span class="badge" id="badgeDemandas" style="display:none;">0</span></div>
      <div class="tab" data-tab="drive" onclick="setTab('drive', this)"><svg class="ic"><use href="#i-folder"/></svg>Drive</div>
      <div class="tab" onclick="toggleMenuMais()" id="tabMais">⋯ Mais</div>
    </div>
    <div id="menuMais" style="display:none;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:8px;margin:-10px 0 16px;">
      <div class="tab" data-tab="videos" onclick="setTab('videos', this); toggleMenuMais();" style="width:100%;margin-bottom:6px;"><svg class="ic"><use href="#i-film"/></svg>Status dos Vídeos</div>
      <div class="tab" data-tab="ideias" onclick="setTab('ideias', this); toggleMenuMais();" style="width:100%;margin-bottom:6px;"><svg class="ic"><use href="#i-bulb"/></svg>Banco de Ideias</div>
      <div class="tab" data-tab="stories" onclick="setTab('stories', this); toggleMenuMais();" style="width:100%;margin-bottom:6px;"><svg class="ic"><use href="#i-image"/></svg>Stories</div>
      <div class="tab" data-tab="atas" onclick="setTab('atas', this); toggleMenuMais();" style="width:100%;margin-bottom:6px;"><svg class="ic"><use href="#i-pen"/></svg>Atas de Reunião</div>
      <div class="tab" data-tab="info" onclick="setTab('info', this); toggleMenuMais();" style="width:100%;"><svg class="ic"><use href="#i-file"/></svg>Informações Extras</div>
    </div>

    <div id="painelCalendario"></div>
    <div id="painelDemandas" style="display:none;"></div>
    <div id="painelDrive" style="display:none;"></div>
    <div id="painelVideos" style="display:none;"></div>
    <div id="painelIdeias" style="display:none;"></div>
    <div id="painelStories" style="display:none;"></div>
    <div id="painelAtas" style="display:none;"></div>
    <div id="painelInfo" style="display:none;"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs, addDoc, doc, getDoc, setDoc, updateDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAyvxHHInEQMpcNHKY__lj3T2G5cikGoyw",
    authDomain: "get-started-4956d.firebaseapp.com",
    projectId: "get-started-4956d",
    storageBucket: "get-started-4956d.firebasestorage.app",
    messagingSenderId: "27813235721",
    appId: "1:27813235721:web:38c8e840153e2ae3853cd8"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const STAGE_LABEL = { planejamento:'Planejamento', roteiro:'Roteiro', gravacao:'Gravação', edicao:'Edição', revisao:'Revisão', programado:'Programado', publicado:'Publicado' };
  const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  let CLIENTES_LISTA = [];
  let clienteAtual = null;

  function esc(s){ return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  async function carregarClientes(){
    const snap = await getDocs(collection(db,'clientes_extras'));
    const extras = []; snap.forEach(d => extras.push({slug:d.data().slug, nome:d.data().nome}));
    // Lista fixa dos clientes principais (mantida em paralelo ao sistema interno)
    const FIXOS = [
      {slug:'bluefit', nome:'Bluefit'},{slug:'camargos', nome:"Camargo's"},{slug:'juliane-nerone', nome:'Juliane Nerone'},
      {slug:'dra-monique', nome:'Dra. Monique'},{slug:'hitech', nome:'Hitech'},{slug:'joaquin-assados', nome:'Joaquin Assados'},
      {slug:'mochi', nome:'Mochi'},{slug:'vitalle-odonto', nome:'Vitalle Odonto'},{slug:'place', nome:'Place'},
      {slug:'stokki', nome:'Stokki'},{slug:'vip', nome:'Vip'},{slug:'vital-seg', nome:'Vital Seg'},
      {slug:'divina-cantina', nome:'Divina Cantina'},{slug:'helo-arquiteta', nome:'Helo Arquiteta'},{slug:'rodrigo', nome:'Rodrigo'},
      {slug:'fior-restaurante', nome:'Fior Restaurante'}
    ];
    const todos = [...FIXOS, ...extras];
    CLIENTES_LISTA = todos.filter((c,i)=>todos.findIndex(x=>x.slug===c.slug)===i).sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR'));
    const sel = document.getElementById('selCliente');
    sel.innerHTML = '<option value="">Selecione...</option>' + CLIENTES_LISTA.map(c=>`<option value="${c.slug}" data-nome="${esc(c.nome)}">${esc(c.nome)}</option>`).join('');
  }

  window.entrarPortal = function(){
    const sel = document.getElementById('selCliente');
    if(!sel.value){ alert('Escolhe sua empresa antes de entrar.'); return; }
    clienteAtual = { slug: sel.value, nome: sel.selectedOptions[0].dataset.nome };
    localStorage.setItem('portalClienteSlug', clienteAtual.slug);
    document.getElementById('telaSelecao').style.display = 'none';
    document.getElementById('telaPortal').style.display = 'block';
    document.getElementById('nomeClientePortal').innerHTML = esc(clienteAtual.nome);
    carregarCalendario();
    carregarDemandas();
    carregarDrive();
    carregarVideos();
    carregarIdeias();
    carregarStories();
    carregarAtas();
    carregarInfo();
  };

  window.sairPortal = function(){
    localStorage.removeItem('portalClienteSlug');
    location.reload();
  };

  window.toggleMenuMais = function(){
    const menu = document.getElementById('menuMais');
    menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
  };

  window.setTab = function(nome, el){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    if(['videos','ideias','stories','atas','info'].includes(nome)) document.getElementById('tabMais').classList.add('active');
    ['Calendario','Demandas','Drive','Videos','Ideias','Stories','Atas','Info'].forEach(p => {
      document.getElementById('painel'+p).style.display = (p.toLowerCase()===nome) ? 'block' : 'none';
    });
  };

  async function carregarCalendario(){
    const cont = document.getElementById('painelCalendario');
    cont.innerHTML = '<div class="empty">Carregando calendário...</div>';
    const snap = await getDoc(doc(db,'calendarios', clienteAtual.slug));
    const items = snap.exists() ? (snap.data().items||[]) : [];
    if(!items.length){ cont.innerHTML = '<div class="card"><div class="empty">Nenhum conteúdo planejado ainda esse mês.</div></div>'; return; }
    items.sort((a,b)=>(a.day||0)-(b.day||0));
    const mesAtual = MESES[new Date().getMonth()];
    cont.innerHTML = `<div class="card"><h2>Calendário de ${mesAtual}</h2><div class="sub" style="margin-bottom:0;">Acompanhe aqui a evolução de cada conteúdo do mês.</div></div>` +
      '<div class="card">' + items.map(it => `
        <div class="day">
          <div class="daynum"><div class="d">${it.day||'?'}</div><div class="m">${(mesAtual||'').slice(0,3)}</div></div>
          <div style="flex:1;">
            <div class="nome">${esc(it.name)}</div>
            ${it.desc ? '<div class="meta">'+esc((it.desc||'').slice(0,120))+'</div>' : ''}
            <span class="selo ${it.stage||'planejamento'}">${STAGE_LABEL[it.stage]||'Planejamento'}</span>
          </div>
        </div>
      `).join('') + '</div>';
  }

  async function carregarDemandas(){
    const cont = document.getElementById('painelDemandas');
    cont.innerHTML = '<div class="empty">Carregando...</div>';
    const snap = await getDocs(collection(db,'demandas_cliente'));
    const minhas = []; snap.forEach(d => { if(d.data().cliente===clienteAtual.slug) minhas.push({id:d.id, ...d.data()}); });
    minhas.sort((a,b)=>(b.criadoEm?.seconds||0)-(a.criadoEm?.seconds||0));
    const badge = document.getElementById('badgeDemandas');
    const abertas = minhas.filter(d=>d.status!=='concluida').length;
    badge.style.display = abertas ? 'inline-block' : 'none'; badge.textContent = abertas;

    const STATUS_LABEL = { pendente:'Pendente', andamento:'Em andamento', aguardando:'Aguardando retorno', concluida:'Concluída' };
    const STATUS_COR = { pendente:'roteiro', andamento:'edicao', aguardando:'edicao', concluida:'publicado' };

    let html = `<div class="card">
      <h2>Nova demanda</h2>
      <div class="field"><label>Pra quem é? (opcional — se não souber, deixa em "Equipe geral")</label>
        <select id="novaDemandaDestino">
          <option value="Amanda">Equipe geral (Amanda organiza)</option>
          <option value="Gabrielle">Gabrielle — Estratégia/Roteiro</option>
          <option value="Cecília">Cecília — Agendamento</option>
        </select>
      </div>
      <div class="field"><label>O que você precisa?</label><textarea id="novaDemandaTexto" placeholder="Descreve aqui o que você precisa da equipe..."></textarea></div>
      <button class="btn" onclick="enviarDemandaCliente()">Enviar demanda</button>
    </div>`;

    html += '<div class="card"><h2>Suas demandas</h2>';
    html += minhas.length ? minhas.map(d => `
      <div class="item">
        <div class="nome">${esc(d.texto)}</div>
        <div class="meta">${d.criadoEm?.seconds ? new Date(d.criadoEm.seconds*1000).toLocaleDateString('pt-BR') : ''}</div>
        <span class="selo ${STATUS_COR[d.status]||'roteiro'}">${STATUS_LABEL[d.status]||'Pendente'}</span>
      </div>
    `).join('') : '<div class="empty">Nenhuma demanda enviada ainda.</div>';
    html += '</div>';
    cont.innerHTML = html;
  }

  window.enviarDemandaCliente = async function(){
    const texto = document.getElementById('novaDemandaTexto').value.trim();
    if(!texto){ alert('Escreve o que você precisa.'); return; }
    const destinatario = document.getElementById('novaDemandaDestino').value;
    await addDoc(collection(db,'demandas_cliente'), {
      cliente: clienteAtual.slug, clienteNome: clienteAtual.nome,
      texto, status: 'pendente', criadoEm: serverTimestamp()
    });
    // Cria também no painel interno, ja vinculada ao cliente e pra pessoa certa
    await addDoc(collection(db,'demandas'), {
      titulo: 'Cliente pediu: ' + texto.slice(0,60), descricao: texto,
      origem: 'cliente', clienteNome: clienteAtual.nome, destinatario,
      prazoData: new Date().toISOString().slice(0,10), prazoHora: '19:00',
      status: 'pendente', provaTexto: '', provaImagemUrl: '', criadoEm: serverTimestamp()
    });
    document.getElementById('novaDemandaTexto').value = '';
    carregarDemandas();
  };

  async function carregarDrive(){
    const cont = document.getElementById('painelDrive');
    const snap = await getDoc(doc(db,'clientes_drive', clienteAtual.slug));
    const link = snap.exists() ? snap.data().link : null;
    cont.innerHTML = `<div class="card">
      <h2><svg class="ic"><use href="#i-folder"/></svg>Drive do seu projeto</h2>
      <div class="sub" style="margin-bottom:12px;">Logos, identidade visual, fotos, vídeos e documentos importantes.</div>
      ${link ? '<a href="'+esc(link)+'" target="_blank" class="btn" style="display:block;text-align:center;text-decoration:none;">Abrir pasta no Drive ↗</a>' : '<div class="empty">O link do Drive ainda não foi configurado pela equipe. Fala com a Amanda!</div>'}
    </div>`;
  }

  const VIDEO_STATUS_LABEL = { aguardando_edicao:'Em edição', correcao:'Em ajuste', aguardando_aprovacao:'Em revisão interna', aguardando_cliente:'Esperando sua aprovação', aprovado:'Aprovado' };
  const VIDEO_STATUS_COR = { aguardando_edicao:'roteiro', correcao:'gravacao', aguardando_aprovacao:'edicao', aguardando_cliente:'gravacao', aprovado:'publicado' };

  async function carregarVideos(){
    const cont = document.getElementById('painelVideos');
    cont.innerHTML = '<div class="empty">Carregando...</div>';
    const [videosSnap, postagensSnap] = await Promise.all([
      getDocs(collection(db,'videos_producao')), getDocs(collection(db,'postagens'))
    ]);
    const meusVideos = []; videosSnap.forEach(d => { const v=d.data(); if(v.cliente===clienteAtual.slug && !v.excluido && v.status!=='aprovado') meusVideos.push(v); });
    const minhasPostagens = []; postagensSnap.forEach(d => { const p=d.data(); if(p.cliente===clienteAtual.slug) minhasPostagens.push(p); });
    const agendadas = minhasPostagens.filter(p=>p.status==='agendado').sort((a,b)=>(a.dataAgendada||'').localeCompare(b.dataAgendada||''));
    const aguardandoVoce = meusVideos.filter(v=>v.status==='aguardando_cliente');

    let html = `<div class="card"><h2><svg class="ic"><use href="#i-activity"/></svg>Status dos Vídeos</h2><div class="sub" style="margin-bottom:0;">Direto da nossa produção — atualiza sozinho, sem ninguém precisar digitar nada aqui.</div></div>`;

    if(aguardandoVoce.length){
      html += `<div class="card" style="border-color:var(--yellow);"><h2 style="font-size:14px;">Esperando sua aprovação</h2>` +
        aguardandoVoce.map(v => `<div class="item"><div class="nome">${esc(v.titulo)}</div></div>`).join('') + `</div>`;
    }

    html += `<div class="card"><h2 style="font-size:14px;">Em produção agora</h2>`;
    html += meusVideos.length ? meusVideos.map(v => `
      <div class="item"><div class="nome">${esc(v.titulo)}</div><span class="selo ${VIDEO_STATUS_COR[v.status]||'roteiro'}">${VIDEO_STATUS_LABEL[v.status]||v.status}</span></div>
    `).join('') : '<div class="empty">Nenhum vídeo em produção agora.</div>';
    html += `</div>`;

    html += `<div class="card"><h2 style="font-size:14px;">Próximas postagens agendadas</h2>`;
    html += agendadas.length ? agendadas.map(p => `
      <div class="item"><div class="nome">${esc(p.titulo||'Postagem')}</div><div class="meta">${p.dataAgendada ? new Date(p.dataAgendada).toLocaleDateString('pt-BR') : ''} ${p.horaAgendada||''}</div></div>
    `).join('') : '<div class="empty">Nada agendado ainda.</div>';
    html += `</div>`;

    cont.innerHTML = html;
  }

  const IDEIA_STATUS_LABEL = { recebida:'Recebida', analise:'Em análise', aprovada:'Aprovada', adaptando:'Adaptando', gravando:'Gravando', publicada:'Publicada', naoUsada:'Não será utilizada' };
  const IDEIA_STATUS_COR = { recebida:'roteiro', analise:'edicao', aprovada:'publicado', adaptando:'edicao', gravando:'gravacao', publicada:'publicado', naoUsada:'roteiro' };

  async function carregarIdeias(){
    const cont = document.getElementById('painelIdeias');
    cont.innerHTML = '<div class="empty">Carregando...</div>';
    const snap = await getDocs(collection(db,'referencias_cliente'));
    const minhas = []; snap.forEach(d => { if(d.data().cliente===clienteAtual.slug) minhas.push({id:d.id, ...d.data()}); });
    minhas.sort((a,b)=>(b.criadoEm?.seconds||0)-(a.criadoEm?.seconds||0));

    let html = `<div class="card">
      <h2>Nova referência</h2>
      <div class="sub" style="margin-bottom:10px;">Manda um link do Instagram, TikTok, Pinterest, YouTube ou uma imagem que você curtiu.</div>
      <div class="field"><label>Link ou descrição</label><input type="text" id="novaIdeiaLink" placeholder="Cola o link aqui..."></div>
      <div class="field" style="margin-top:8px;"><label>Observação (opcional)</label><textarea id="novaIdeiaObs" placeholder="Por que você gostou dessa ideia..."></textarea></div>
      <button class="btn" onclick="enviarIdeiaCliente()">Adicionar ideia</button>
    </div>
    <div class="card"><h2>Suas ideias enviadas</h2>`;
    html += minhas.length ? minhas.map(r => `
      <div class="item">
        <a href="${esc(r.link)}" target="_blank" class="nome" style="color:var(--yellow);text-decoration:none;">${esc(r.link)}</a>
        ${r.observacao ? '<div class="meta">'+esc(r.observacao)+'</div>' : ''}
        <span class="selo ${IDEIA_STATUS_COR[r.status]||'roteiro'}">${IDEIA_STATUS_LABEL[r.status]||'Recebida'}</span>
      </div>
    `).join('') : '<div class="empty">Nenhuma ideia enviada ainda.</div>';
    html += '</div>';
    cont.innerHTML = html;
  }

  async function alertarEquipe(titulo, descricao){
    await addDoc(collection(db,'demandas'), {
      titulo, descricao, origem: 'cliente', clienteNome: clienteAtual.nome,
      destinatario: 'Amanda', prazoData: new Date().toISOString().slice(0,10), prazoHora: '19:00',
      status: 'pendente', provaTexto: '', provaImagemUrl: '', criadoEm: serverTimestamp()
    });
  }

  window.enviarIdeiaCliente = async function(){
    const link = document.getElementById('novaIdeiaLink').value.trim();
    if(!link){ alert('Cola o link primeiro.'); return; }
    const observacao = document.getElementById('novaIdeiaObs').value.trim();
    await addDoc(collection(db,'referencias_cliente'), {
      cliente: clienteAtual.slug, clienteNome: clienteAtual.nome, link, observacao,
      status: 'recebida', criadoEm: serverTimestamp()
    });
    await alertarEquipe('💡 ' + clienteAtual.nome + ' mandou uma ideia nova', link);
    document.getElementById('novaIdeiaLink').value = '';
    document.getElementById('novaIdeiaObs').value = '';
    carregarIdeias();
  };

  async function carregarStories(){
    const cont = document.getElementById('painelStories');
    cont.innerHTML = '<div class="empty">Carregando...</div>';
    const snap = await getDocs(collection(db,'stories_semanais'));
    const meus = []; snap.forEach(d => { if(d.data().cliente===clienteAtual.slug) meus.push({id:d.id, ...d.data()}); });
    meus.sort((a,b)=>(b.criadoEm?.seconds||0)-(a.criadoEm?.seconds||0));

    let html = `<div class="card"><h2><svg class="ic"><use href="#i-image"/></svg>Seus Stories</h2><div class="sub" style="margin-bottom:0;">Ideias de stories que a equipe está preparando pra você — acompanha, aprova ou pede ajuste.</div></div>`;
    if(!meus.length){ html += '<div class="card"><div class="empty">Nenhum story enviado ainda essa semana.</div></div>'; cont.innerHTML = html; return; }

    html += meus.map(s => `
      <div class="card">
        <div class="nome" style="font-size:14px;">${esc(s.titulo)}</div>
        ${s.descricao ? '<div class="meta" style="margin-top:4px;">'+esc(s.descricao)+'</div>' : ''}
        <span class="selo ${s.status==='aprovado'?'publicado':s.status==='postado'?'publicado':s.status==='ajuste'?'gravacao':'roteiro'}">${s.status==='aprovado'?'Aprovado':s.status==='postado'?'Já postado':s.status==='ajuste'?'Pediu ajuste':'Aguardando você'}</span>
        ${s.status!=='postado' ? `<div class="btn secondary" style="margin-top:10px;padding:9px;text-align:center;" onclick="responderStory('${s.id}','aprovado')">✓ Aprovar</div>
        <div class="btn secondary" style="margin-top:6px;padding:9px;text-align:center;" onclick="pedirAjusteStory('${s.id}')">Pedir ajuste</div>` : ''}
      </div>
    `).join('');
    cont.innerHTML = html;
  }

  window.responderStory = async function(id, status){
    await updateDoc(doc(db,'stories_semanais', id), { status, respondidoEm: serverTimestamp() });
    carregarStories();
  };

  window.pedirAjusteStory = async function(id){
    const ajuste = prompt('O que precisa mudar nesse story?');
    if(!ajuste) return;
    await updateDoc(doc(db,'stories_semanais', id), { status:'ajuste', ajusteTexto: ajuste, respondidoEm: serverTimestamp() });
    await alertarEquipe('⚠️ ' + clienteAtual.nome + ' pediu ajuste num story', ajuste);
    carregarStories();
  };

  async function carregarAtas(){
    const cont = document.getElementById('painelAtas');
    cont.innerHTML = '<div class="empty">Carregando...</div>';
    const snap = await getDocs(collection(db,'atas_reuniao'));
    const minhas = []; snap.forEach(d => { if(d.data().cliente===clienteAtual.slug) minhas.push(d.data()); });
    minhas.sort((a,b)=>(b.data||'').localeCompare(a.data||''));

    let html = `<div class="card"><h2><svg class="ic"><use href="#i-pen"/></svg>Histórico de Reuniões</h2><div class="sub" style="margin-bottom:0;">Tudo que já foi conversado e decidido.</div></div>`;
    if(!minhas.length){ html += '<div class="card"><div class="empty">Nenhuma reunião registrada ainda.</div></div>'; cont.innerHTML = html; return; }

    html += minhas.map(a => `
      <div class="card">
        <div class="nome">${a.data ? new Date(a.data).toLocaleDateString('pt-BR') : ''}</div>
        ${a.participantes ? '<div class="meta" style="margin-top:6px;"><b>Participantes:</b> '+esc(a.participantes)+'</div>' : ''}
        ${a.assuntos ? '<div class="meta" style="margin-top:6px;"><b>Assuntos:</b> '+esc(a.assuntos)+'</div>' : ''}
        ${a.decisoes ? '<div class="meta" style="margin-top:6px;"><b>Decisões:</b> '+esc(a.decisoes)+'</div>' : ''}
        ${a.proximosPassos ? '<div class="meta" style="margin-top:6px;"><b>Próximos passos:</b> '+esc(a.proximosPassos)+'</div>' : ''}
      </div>
    `).join('');
    cont.innerHTML = html;
  }

  async function carregarInfo(){
    const cont = document.getElementById('painelInfo');
    const snap = await getDoc(doc(db,'info_extras_cliente', clienteAtual.slug));
    const dados = snap.exists() ? snap.data() : {};
    cont.innerHTML = `<div class="card">
      <h2><svg class="ic"><use href="#i-file"/></svg>Informações Extras</h2>
      <div class="sub" style="margin-bottom:12px;">Preferências, restrições da marca, e tudo que a equipe não pode esquecer.</div>
      <textarea id="infoTexto" style="min-height:160px;">${esc(dados.texto||'')}</textarea>
      <button class="btn" onclick="salvarInfoExtras()">Salvar</button>
    </div>`;
  }

  window.salvarInfoExtras = async function(){
    const texto = document.getElementById('infoTexto').value.trim();
    await setDoc(doc(db,'info_extras_cliente', clienteAtual.slug), { texto, clienteNome: clienteAtual.nome, atualizadoEm: serverTimestamp() });
    alert('Salvo!');
  };

  // Auto-entrada se ja escolheu antes nesse navegador
  window.addEventListener('DOMContentLoaded', async () => {
    await carregarClientes();
    const params = new URLSearchParams(location.search);
    const daUrl = params.get('c');
    const salvo = daUrl || localStorage.getItem('portalClienteSlug');
    if(salvo){
      const c = CLIENTES_LISTA.find(x=>x.slug===salvo);
      if(c){ document.getElementById('selCliente').value = salvo; window.entrarPortal(); }
    }
  });
</script>
</body>
</html>
