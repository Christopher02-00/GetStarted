<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal do Cliente · Get Started</title>
<style>
  :root{
    --graphite:#2C2D2F; --yellow:#FBBC19; --offwhite:#F0F1ED;
    --deep:#212123; --line:#3A3A3D; --muted:#8a8a8d;
    --green:#4caf72; --greenbg:#1e3428; --red:#e0625f; --redbg:#3a2323; --paper:#26272a;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--graphite);color:var(--offwhite);min-height:100vh;}
  .wrap{max-width:900px;margin:0 auto;padding:22px 18px 60px;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;margin-bottom:24px;}
  .dot{width:13px;height:13px;border-radius:50%;background:var(--yellow);}
  .rule{width:52px;height:5px;background:var(--yellow);border-radius:2px;margin-bottom:8px;}
  h1{font-size:24px;font-weight:800;margin-bottom:4px;}
  h1 .y{color:var(--yellow);}
  .sub{color:var(--muted);font-size:12.5px;margin-bottom:20px;}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px;}
  .card h2{font-size:15px;margin-bottom:6px;}
  .field label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:5px;}
  select, input, textarea{width:100%;background:var(--deep);border:1px solid var(--line);color:#fff;padding:11px;border-radius:9px;font-size:14px;font-family:inherit;}
  textarea{min-height:80px;resize:vertical;}
  .btn{background:var(--yellow);color:var(--graphite);border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;width:100%;margin-top:10px;}
  .btn.secondary{background:transparent;border:1px solid var(--line);color:var(--offwhite);}
  .tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:16px;padding-bottom:4px;}
  .tab{background:var(--paper);border:1px solid var(--line);color:var(--muted);padding:9px 15px;border-radius:20px;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap;}
  .tab.active{background:var(--yellow);color:var(--graphite);border-color:var(--yellow);}
  .item{background:var(--deep);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
  .item .nome{font-weight:700;font-size:13.5px;}
  .item .meta{color:var(--muted);font-size:11px;margin-top:3px;}
  .selo{display:inline-block;font-size:9.5px;font-weight:800;text-transform:uppercase;padding:3px 8px;border-radius:20px;margin-top:6px;}
  .selo.planejamento{background:#333;color:#ccc;}
  .selo.roteiro{background:#333;color:#ccc;}
  .selo.gravacao{background:var(--redbg);color:var(--red);}
  .selo.edicao{background:#3a331e;color:var(--yellow);}
  .selo.revisao{background:#3a331e;color:var(--yellow);}
  .selo.programado{background:#1e2f3a;color:#7ec4e0;}
  .selo.publicado{background:var(--greenbg);color:var(--green);}
  .day{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--line);}
  .day:last-child{border-bottom:none;}
  .daynum{width:40px;text-align:center;flex-shrink:0;}
  .daynum .d{font-size:19px;font-weight:800;}
  .daynum .m{font-size:9px;color:var(--muted);text-transform:uppercase;}
  .empty{color:var(--muted);font-size:12.5px;text-align:center;padding:20px;}
  .backBtn{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;margin-bottom:14px;}
  .badge{background:var(--yellow);color:var(--graphite);font-size:10px;font-weight:800;padding:2px 7px;border-radius:10px;margin-left:6px;}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="brand"><span class="dot"></span> Get Started <span style="color:var(--muted);font-weight:500;">· Portal do Cliente</span></div>

  <div id="telaSelecao">
    <div class="rule"></div>
    <h1>Bem-vindo ao seu <span class="y">Portal</span></h1>
    <div class="sub">Seleciona sua empresa pra acessar seu acompanhamento.</div>
    <div class="card">
      <div class="field"><label>Sua empresa</label><select id="selCliente"><option value="">Selecione...</option></select></div>
      <button class="btn" onclick="entrarPortal()">Entrar</button>
    </div>
  </div>

  <div id="telaPortal" style="display:none;">
    <button class="backBtn" onclick="sairPortal()">← Trocar de empresa</button>
    <div class="rule"></div>
    <h1 id="nomeClientePortal">Cliente</h1>
    <div class="sub">Seu painel de acompanhamento — tudo em um lugar só.</div>

    <div class="tabs">
      <div class="tab active" data-tab="calendario" onclick="setTab('calendario', this)">📅 Calendário</div>
      <div class="tab" data-tab="demandas" onclick="setTab('demandas', this)">📋 Demandas<span class="badge" id="badgeDemandas" style="display:none;">0</span></div>
      <div class="tab" data-tab="drive" onclick="setTab('drive', this)">📁 Drive</div>
    </div>

    <div id="painelCalendario"></div>
    <div id="painelDemandas" style="display:none;"></div>
    <div id="painelDrive" style="display:none;"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs, addDoc, doc, getDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAyvxHHInEQMpcNHKY__lj3T2G5cikGoyw",
    authDomain: "get-started-4956d.firebaseapp.com",
    projectId: "get-started-4956d",
    storageBucket: "get-started-4956d.firebasestorage.app",
    messagingSenderId: "27813235721",
    appId: "1:27813235721:web:38c8e840153e2ae3853cd8"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const STAGE_LABEL = { planejamento:'Planejamento', roteiro:'Roteiro', gravacao:'Gravação', edicao:'Edição', revisao:'Revisão', programado:'Programado', publicado:'Publicado' };
  const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  let CLIENTES_LISTA = [];
  let clienteAtual = null;

  function esc(s){ return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  async function carregarClientes(){
    const snap = await getDocs(collection(db,'clientes_extras'));
    const extras = []; snap.forEach(d => extras.push({slug:d.data().slug, nome:d.data().nome}));
    // Lista fixa dos clientes principais (mantida em paralelo ao sistema interno)
    const FIXOS = [
      {slug:'bluefit', nome:'Bluefit'},{slug:'camargos', nome:"Camargo's"},{slug:'juliane-nerone', nome:'Juliane Nerone'},
      {slug:'dra-monique', nome:'Dra. Monique'},{slug:'hitech', nome:'Hitech'},{slug:'joaquin-assados', nome:'Joaquin Assados'},
      {slug:'mochi', nome:'Mochi'},{slug:'vitalle-odonto', nome:'Vitalle Odonto'},{slug:'place', nome:'Place'},
      {slug:'stokki', nome:'Stokki'},{slug:'vip', nome:'Vip'},{slug:'vital-seg', nome:'Vital Seg'},
      {slug:'divina-cantina', nome:'Divina Cantina'},{slug:'helo-arquiteta', nome:'Helo Arquiteta'},{slug:'rodrigo', nome:'Rodrigo'},
      {slug:'fior-restaurante', nome:'Fior Restaurante'}
    ];
    const todos = [...FIXOS, ...extras];
    CLIENTES_LISTA = todos.filter((c,i)=>todos.findIndex(x=>x.slug===c.slug)===i).sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR'));
    const sel = document.getElementById('selCliente');
    sel.innerHTML = '<option value="">Selecione...</option>' + CLIENTES_LISTA.map(c=>`<option value="${c.slug}" data-nome="${esc(c.nome)}">${esc(c.nome)}</option>`).join('');
  }

  window.entrarPortal = function(){
    const sel = document.getElementById('selCliente');
    if(!sel.value){ alert('Escolhe sua empresa antes de entrar.'); return; }
    clienteAtual = { slug: sel.value, nome: sel.selectedOptions[0].dataset.nome };
    localStorage.setItem('portalClienteSlug', clienteAtual.slug);
    document.getElementById('telaSelecao').style.display = 'none';
    document.getElementById('telaPortal').style.display = 'block';
    document.getElementById('nomeClientePortal').innerHTML = esc(clienteAtual.nome);
    carregarCalendario();
    carregarDemandas();
    carregarDrive();
  };

  window.sairPortal = function(){
    localStorage.removeItem('portalClienteSlug');
    location.reload();
  };

  window.setTab = function(nome, el){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('painelCalendario').style.display = nome==='calendario' ? 'block' : 'none';
    document.getElementById('painelDemandas').style.display = nome==='demandas' ? 'block' : 'none';
    document.getElementById('painelDrive').style.display = nome==='drive' ? 'block' : 'none';
  };

  async function carregarCalendario(){
    const cont = document.getElementById('painelCalendario');
    cont.innerHTML = '<div class="empty">Carregando calendário...</div>';
    const snap = await getDoc(doc(db,'calendarios', clienteAtual.slug));
    const items = snap.exists() ? (snap.data().items||[]) : [];
    if(!items.length){ cont.innerHTML = '<div class="card"><div class="empty">Nenhum conteúdo planejado ainda esse mês.</div></div>'; return; }
    items.sort((a,b)=>(a.day||0)-(b.day||0));
    const mesAtual = MESES[new Date().getMonth()];
    cont.innerHTML = `<div class="card"><h2>Calendário de ${mesAtual}</h2><div class="sub" style="margin-bottom:0;">Acompanhe aqui a evolução de cada conteúdo do mês.</div></div>` +
      '<div class="card">' + items.map(it => `
        <div class="day">
          <div class="daynum"><div class="d">${it.day||'?'}</div><div class="m">${(mesAtual||'').slice(0,3)}</div></div>
          <div style="flex:1;">
            <div class="nome">${esc(it.name)}</div>
            ${it.desc ? '<div class="meta">'+esc((it.desc||'').slice(0,120))+'</div>' : ''}
            <span class="selo ${it.stage||'planejamento'}">${STAGE_LABEL[it.stage]||'Planejamento'}</span>
          </div>
        </div>
      `).join('') + '</div>';
  }

  async function carregarDemandas(){
    const cont = document.getElementById('painelDemandas');
    cont.innerHTML = '<div class="empty">Carregando...</div>';
    const snap = await getDocs(collection(db,'demandas_cliente'));
    const minhas = []; snap.forEach(d => { if(d.data().cliente===clienteAtual.slug) minhas.push({id:d.id, ...d.data()}); });
    minhas.sort((a,b)=>(b.criadoEm?.seconds||0)-(a.criadoEm?.seconds||0));
    const badge = document.getElementById('badgeDemandas');
    const abertas = minhas.filter(d=>d.status!=='concluida').length;
    badge.style.display = abertas ? 'inline-block' : 'none'; badge.textContent = abertas;

    const STATUS_LABEL = { pendente:'Pendente', andamento:'Em andamento', aguardando:'Aguardando retorno', concluida:'Concluída' };
    const STATUS_COR = { pendente:'roteiro', andamento:'edicao', aguardando:'edicao', concluida:'publicado' };

    let html = `<div class="card">
      <h2>Nova demanda</h2>
      <div class="field"><label>O que você precisa?</label><textarea id="novaDemandaTexto" placeholder="Descreve aqui o que você precisa da equipe..."></textarea></div>
      <button class="btn" onclick="enviarDemandaCliente()">Enviar demanda</button>
    </div>`;

    html += '<div class="card"><h2>Suas demandas</h2>';
    html += minhas.length ? minhas.map(d => `
      <div class="item">
        <div class="nome">${esc(d.texto)}</div>
        <div class="meta">${d.criadoEm?.seconds ? new Date(d.criadoEm.seconds*1000).toLocaleDateString('pt-BR') : ''}</div>
        <span class="selo ${STATUS_COR[d.status]||'roteiro'}">${STATUS_LABEL[d.status]||'Pendente'}</span>
      </div>
    `).join('') : '<div class="empty">Nenhuma demanda enviada ainda.</div>';
    html += '</div>';
    cont.innerHTML = html;
  }

  window.enviarDemandaCliente = async function(){
    const texto = document.getElementById('novaDemandaTexto').value.trim();
    if(!texto){ alert('Escreve o que você precisa.'); return; }
    await addDoc(collection(db,'demandas_cliente'), {
      cliente: clienteAtual.slug, clienteNome: clienteAtual.nome,
      texto, status: 'pendente', criadoEm: serverTimestamp()
    });
    // Cria também no painel interno da Amanda, ja vinculada ao cliente
    await addDoc(collection(db,'demandas'), {
      titulo: '👤 Cliente pediu: ' + texto.slice(0,60), descricao: texto,
      origem: 'cliente', clienteNome: clienteAtual.nome, destinatario: 'Amanda',
      prazoData: new Date().toISOString().slice(0,10), prazoHora: '19:00',
      status: 'pendente', provaTexto: '', provaImagemUrl: '', criadoEm: serverTimestamp()
    });
    document.getElementById('novaDemandaTexto').value = '';
    carregarDemandas();
  };

  async function carregarDrive(){
    const cont = document.getElementById('painelDrive');
    const snap = await getDoc(doc(db,'clientes_drive', clienteAtual.slug));
    const link = snap.exists() ? snap.data().link : null;
    cont.innerHTML = `<div class="card">
      <h2>📁 Drive do seu projeto</h2>
      <div class="sub" style="margin-bottom:12px;">Logos, identidade visual, fotos, vídeos e documentos importantes.</div>
      ${link ? '<a href="'+esc(link)+'" target="_blank" class="btn" style="display:block;text-align:center;text-decoration:none;">Abrir pasta no Drive ↗</a>' : '<div class="empty">O link do Drive ainda não foi configurado pela equipe. Fala com a Amanda!</div>'}
    </div>`;
  }

  // Auto-entrada se ja escolheu antes nesse navegador
  window.addEventListener('DOMContentLoaded', async () => {
    await carregarClientes();
    const salvo = localStorage.getItem('portalClienteSlug');
    if(salvo){
      const c = CLIENTES_LISTA.find(x=>x.slug===salvo);
      if(c){ document.getElementById('selCliente').value = salvo; window.entrarPortal(); }
    }
  });
</script>
</body>
</html>
